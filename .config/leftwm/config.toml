modkey = "Mod4"
mousekey = "Mod4"
workspaces = []
tags = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]
layouts = ["MainAndVertStack", "RightWiderLeftStack", "LeftWiderRightStack", "Monocle"]
#layouts = ["MainAndVertStack", "MainAndHorizontalStack", "MainAndDeck", "GridHorizontal", "EvenHorizontal", "EvenVertical", "Fibonacci", "LeftMain", "CenterMain", "CenterMainBalanced", "CenterMainFluid", "Monocle", "RightWiderLeftStack", "LeftWiderRightStack"]
layout_mode = "Workspace"
insert_behavior = "Bottom"
disable_current_tag_swap = false
disable_tile_drag = false
focus_behaviour = "Sloppy"
focus_new_windows = true
window_rules = [
  # windows whose WM_CLASS is "Navigator" will be spawn on tag 2 (by position, 1-indexed)
  {window_class = "librewolf", spawn_on_tag = 3},
  {window_class = "firefox", spawn_on_tag = 3},
  # windows whose window title is "Pentablet" will be spawned floating on tag 9
  {window_class = "thunderbird", spawn_on_tag = 4},
  {window_class = "Ferdi", spawn_on_tag = 5},
  {window_class = "Discord", spawn_on_tag = 5},
  {window_class = "Nextcloud", spawn_floating = true},
  {window_title = "floating ncmpcpp", spawn_floating = true},
  {window_title = "floating noise", spawn_floating = true},
  {window_class = "Yad", spawn_floating = true},
  {window_class = "yad", spawn_floating = true},
  {window_class = "leagueclient.exe", spawn_floating = true},
  {window_class = "riotclientux.exe", spawn_floating = true},
]

scratchpad = [
    { name = "Alacritty", value = "alacritty", x = 860, y = 390, height = 500, width = 800 },
]

