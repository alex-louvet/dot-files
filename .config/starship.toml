format = """
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$character"""

right_format = """$cmd_duration"""

[directory]
style = "bold yellow"
truncate_to_repo = false

[character]
success_symbol = "[ ΎΒκ ](green)"
error_symbol = "[ ΎΒκ ]( green)"
vimcmd_symbol = "[ ΎΒκ ](blue)"
vimcmd_visual_symbol = "[ ΎΒκ ](purple)" 
vimcmd_replace_symbol = "[ ΎΒκ ](blue)"
vimcmd_replace_one_symbol = "[ ΎΒκ ](blue)"

[git_branch]
format = '[\[ΎΡα $branch\]]($style)'
style = "bright-white"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "έΑΜ"
untracked = "έΑΜ"
modified = "έΑΜ"
staged = "έΑΜ"
renamed = "έΑΜ"
deleted = "έΑΜ"
stashed = "έΚκ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "bright-white"

[python]
format = "[$virtualenv]($style) "
style = "brwhite"
